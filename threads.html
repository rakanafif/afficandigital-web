<!doctype html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Affican Digital • Fils</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Noto+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <canvas id="bg3d" aria-hidden="true"></canvas>

  <header class="topbar">
    <div class="wrap">
      <a class="brand" href="./index.html">
        <img class="brand-logo" src="./assets/logo.png" alt="Logo" onerror="this.style.display='none'">
        <div class="brand-text">
          <b>Affican Digital</b>
          <span data-i18n="taglineSmall">Marketing • Web • Video</span>
        </div>
      </a>

      <nav class="nav">
        <a href="./services.html" data-i18n="navServices">Services</a>
        <a href="./store.html" data-i18n="navStore">Boutique</a>
        <a class="active" href="./threads.html" data-i18n="navThreads">Fils</a>
        <a href="./contact.html" data-i18n="navContact">Contact</a>
      </nav>

      <div class="controls">
        <div class="lang">
          <button id="btnFR" class="active" type="button">FR</button>
          <button id="btnEN" type="button">EN</button>
          <button id="btnAR" type="button">AR</button>
        </div>
        <a class="cta" href="./contact.html"><span class="dot"></span><span data-i18n="topCTA">Demander un devis</span></a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="page-head">
      <h1 data-i18n="threadsPageTitle">Fils (Threads)</h1>
      <p data-i18n="threadsPageDesc">منشورات قصيرة بأسلوب احترافي. جاهزة للربط مع لوحة تحكم Decap CMS لاحقًا.</p>
    </section>

    <section class="section">
      <div id="threadsGrid" class="grid"></div>
    </section>

    <footer class="footer">
      <div class="wrap">
        <div>© <span id="year"></span> <b>Affican Digital</b> — <span data-i18n="footer">Tous droits réservés.</span></div>
      </div>
    </footer>
  </main>

  <a class="wa-float" id="waFloat" href="#" target="_blank" rel="noopener">
    <span class="wa-badge">WA</span>
    <div class="wa-text">
      <b data-i18n="waTitle">WhatsApp</b>
      <small data-i18n="waSub">Réponse rapide</small>
    </div>
  </a>

  <div class="modal" id="modal">
    <div class="modal-card">
      <div class="modal-head">
        <b id="modalTitle"></b>
        <button class="x" type="button" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body onecol">
        <div>
          <p id="modalDesc"></p>
          <ul id="modalList"></ul>
          <div class="modal-actions">
            <a class="btn" id="modalWA" href="#" target="_blank" rel="noopener"><span data-i18n="shareWA">Partager WhatsApp</span></a>
            <button class="btn secondary" type="button" onclick="closeModal()"><span data-i18n="close">Fermer</span></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="./js/i18n.js"></script>
  <script src="./js/data.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/three-bg.js"></script>
</body>
</html>
